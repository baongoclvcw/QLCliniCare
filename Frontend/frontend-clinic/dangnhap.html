<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Đăng nhập bệnh nhân - CliniCare</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    :root{
      --primary:#3152B8;
      --bg:#f3f4f6;
      --card:#ffffff;
      --text:#1f2937;
      --muted:#6b7280;
      --border:#d8dee9;
      --input-bg:#ffffff;
      --shadow:0 10px 24px rgba(15, 23, 42, 0.08);
      --error:#dc2626;
      --error-bg:#fef2f2;
      --error-border:#fca5a5;
      --success:#22c55e;
    }

    *{
      box-sizing:border-box;
      margin:0;
      padding:0;
    }

    body{
      font-family:"Inter", sans-serif;
      background:var(--bg);
      min-height:100vh;
      color:var(--text);
    }

    .page{
      min-height:100vh;
      display:grid;
      grid-template-columns: 1fr 1.15fr;
    }

    .left-panel{
      background:var(--primary);
      display:flex;
      align-items:center;
      justify-content:center;
      padding:40px;
    }

    .brand-block{
      text-align:center;
      color:#fff;
    }

    .brand-icon{
      width:82px;
      height:82px;
      margin:0 auto 28px;
      border-radius:20px;
      background:rgba(255,255,255,0.14);
      display:flex;
      align-items:center;
      justify-content:center;
    }

    .brand-icon span{
      font-size:38px;
      font-weight:800;
    }

    .brand-name{
      font-size:46px;
      font-weight:800;
      margin-bottom:18px;
    }

    .brand-desc{
      font-size:18px;
      color:rgba(255,255,255,0.88);
    }

    .right-panel{
      display:flex;
      align-items:center;
      justify-content:center;
      padding:40px;
      background:#f5f5f7;
    }

    .login-card{
      width:100%;
      max-width:390px;
      background:#fff;
      border-radius:20px;
      box-shadow:var(--shadow);
      padding:34px;
    }

    .title{
      font-size:28px;
      font-weight:800;
      margin-bottom:8px;
    }

    .subtitle{
      font-size:16px;
      color:var(--muted);
      margin-bottom:30px;
    }

    .field{
      margin-bottom:20px;
    }

    .label{
      font-size:14px;
      font-weight:600;
      margin-bottom:10px;
      display:block;
    }

    .input{
      width:100%;
      height:44px;
      border:1px solid var(--border);
      border-radius:12px;
      padding:0 14px;
      font-size:14px;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .input:focus{
      border-color:var(--primary);
      box-shadow:0 0 0 3px rgba(49,82,184,0.10);
      outline:none;
    }

    .input.is-error {
      border-color: var(--error-border);
      background: var(--error-bg);
      box-shadow: 0 0 0 3px rgba(220,38,38,0.08);
    }

    .input.is-error:focus {
      border-color: var(--error);
      box-shadow: 0 0 0 3px rgba(220,38,38,0.12);
    }

    .error-msg {
      display: none;
      align-items: center;
      gap: 6px;
      margin-top: 7px;
      font-size: 13px;
      font-weight: 500;
      color: var(--error);
    }

    .error-msg.visible {
      display: flex;
    }

    .error-msg::before {
      content: "⚠";
      font-size: 13px;
      flex-shrink: 0;
    }

    .banner-error {
      display: none;
      align-items: center;
      gap: 10px;
      background: var(--error-bg);
      border: 1px solid var(--error-border);
      border-radius: 10px;
      padding: 11px 14px;
      margin-bottom: 20px;
      font-size: 14px;
      font-weight: 500;
      color: var(--error);
    }

    .banner-error.visible {
      display: flex;
    }

    .banner-error-icon {
      font-size: 18px;
      flex-shrink: 0;
    }

    .extra-row{
      display:flex;
      align-items:center;
      margin-bottom:22px;
    }

    .remember{
      display:flex;
      align-items:center;
      gap:8px;
    }

    .btn-submit{
      width:100%;
      height:44px;
      border:none;
      border-radius:12px;
      background:var(--primary);
      color:#fff;
      font-weight:700;
      cursor:pointer;
      font-size:15px;
      transition: opacity 0.15s;
    }

    .btn-submit:hover {
      opacity: 0.92;
    }

    .bottom-text{
      text-align:center;
      margin-top:20px;
      font-size:14px;
      color:var(--muted);
    }

    .bottom-text a{
      color: var(--primary);
      text-decoration: none;
      font-weight: 600;
    }

    .bottom-text a:hover{
      text-decoration: underline;
    }

    /* Toast thông báo thành công */
    .toast{
      display:none;
      position:fixed;
      top:28px;
      left:50%;
      transform:translateX(-50%) translateY(-16px);
      background:#fff;
      border:1.5px solid var(--success);
      border-radius:14px;
      padding:14px 24px;
      font-size:15px;
      font-weight:600;
      color:#15803d;
      box-shadow:0 8px 24px rgba(34,197,94,0.18);
      z-index:9999;
      gap:8px;
      align-items:center;
      transition:opacity 0.3s, transform 0.3s;
      opacity:0;
    }

    .toast.show{
      display:flex;
      opacity:1;
      transform:translateX(-50%) translateY(0);
    }

    .toast-icon{
      font-size:18px;
    }
  </style>
</head>

<body>
  <div class="toast" id="successToast">
    <span class="toast-icon">✅</span>
    Đăng nhập thành công!
  </div>

  <div class="page">
    <div class="left-panel">
      <div class="brand-block">
        <div class="brand-icon"><span>C</span></div>
        <div class="brand-name">CliniCare</div>
        <div class="brand-desc">Chăm sóc sức khỏe dễ dàng hơn mỗi ngày</div>
      </div>
    </div>

    <div class="right-panel">
      <div class="login-card">
        <h1 class="title">Đăng nhập</h1>
        <p class="subtitle">Chào mừng bạn quay lại</p>

        <div id="bannerError" class="banner-error">
          <span class="banner-error-icon">🔒</span>
          <span id="bannerErrorText">Vui lòng nhập đầy đủ thông tin.</span>
        </div>

        <div class="field">
          <label class="label">Email</label>
          <input id="email" class="input" type="email" placeholder="example@email.com" autocomplete="email">
          <div id="emailError" class="error-msg"></div>
        </div>

        <div class="field">
          <label class="label">Mật khẩu</label>
          <input id="password" class="input" type="password" placeholder="••••••••" autocomplete="current-password">
          <div id="passwordError" class="error-msg"></div>
        </div>

        <div class="extra-row">
          <label class="remember">
            <input id="rememberMe" type="checkbox">
            <span>Ghi nhớ đăng nhập</span>
          </label>
        </div>

        <button id="loginBtn" class="btn-submit">Đăng nhập</button>

        <div class="bottom-text">
          Chưa có tài khoản? <a href="benhnhan/dangkybenhnhan.html">Đăng ký</a>
        </div>
      </div>
    </div>
  </div>

  <script src="assets/js/shared/config.js"></script>
  <script src="assets/js/shared/api.js"></script>
  <script src="assets/js/shared/auth.js"></script>
  <script src="dangnhap.js"></script>
</body>
</html>
